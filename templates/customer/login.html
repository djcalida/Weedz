<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Wedzz Motorparts</title>
    <link rel="stylesheet" href="/static/css/customer_index.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>Welcome Back</h1>
            <p>Sign in to access your account and manage orders.</p>
            <form action="templates/customer/login.html" method="post" class="modal-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="••••••••" required>
                </div>
                <button class="btn btn-block" type="submit">Login</button>
            </form>
            <p class="login-footer">Don’t have an account? <a href="templates/customer/registration.html">Register</a></p>
        </div>
    </div>
</body>
</html>
