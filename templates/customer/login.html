{% extends "customer/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p>Sign in to track orders, save favorites, and checkout faster.</p>
        <form class="auth-form" action="/login" method="post">
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="••••••••" required>
            </div>
            <button class="btn btn-primary btn-block" type="submit">Sign In</button>
        </form>
        <div class="divider">or</div>
        <a href="/register" class="btn btn-outline btn-block">Create an Account</a>
        <p class="auth-footer">Don't have an account? <a href="/register">Register here</a></p>
    </div>
</section>
{% endblock %}
