<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Wedzz Motorparts</title>
    <link rel="stylesheet" href="/static/css/customer_index.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>Create Account</h1>
            <p>Join Wedzz Motorparts to track orders, save favorites, and manage your account.</p>
            <form action="/register" method="post" class="modal-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input id="fullName" name="fullName" type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="••••••••" required>
                </div>
                <button class="btn btn-block" type="submit">Register</button>
            </form>
            <p class="login-footer">Already have an account? <a href="/login">Login</a></p>
        </div>
    </div>
</body>
</html>
