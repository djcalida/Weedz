name: Build Flutter APK

on:
  push:
    branches: [ main, master, mobile-app-flutter ]
    paths:
      - 'mobile_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Get dependencies
        working-directory: ./mobile_app/android
        run: flutter pub get
      
      - name: Build APK
        working-directory: ./mobile_app/android
        run: flutter build apk --debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wedzz-mobile-debug
          path: mobile_app/android/build/app/outputs/flutter-apk/app-debug.apk
